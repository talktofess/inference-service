name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-test.txt
      - run: pytest -q
      # Offline benchmark smoke: the canonical sweep + report must run with no GPU.
      - run: python -m infsvc.cli sweep --fresh
      - run: python -m infsvc.cli report

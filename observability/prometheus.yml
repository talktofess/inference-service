global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]
  # When a real engine is running, scrape its native metrics too:
  # - job_name: vllm
  #   static_configs:
  #     - targets: ["vllm:8000"]

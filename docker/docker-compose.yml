# Offline ops stack: gateway (mock backend) + Prometheus + Grafana.
# `docker compose -f docker/docker-compose.yml up` then open Grafana at :3000
# (admin/admin) to see the provisioned "Inference Service" dashboard.
services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    environment:
      INFSVC_PRIMARY_BACKEND: mock
      INFSVC_PRIMARY_PROFILE: vllm
      INFSVC_FALLBACK_BACKEND: mock
      INFSVC_FALLBACK_PROFILE: awq
    ports: ["8080:8080"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]
